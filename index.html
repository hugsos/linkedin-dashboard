<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#080910">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <title>LinkedIn Pipeline</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    :root {
      --bg:        #F3F2EF;
      --surface:   #FFFFFF;
      --surface-2: #F8F7F4;
      --border:    #E0DDD6;
      --blue:      #0A66C2;
      --blue-dim:  rgba(10,102,194,.08);
      --blue-glow: rgba(10,102,194,.12);
      --green:     #057642;
      --green-dim: rgba(5,118,66,.08);
      --red:       #CC1016;
      --red-dim:   rgba(204,16,22,.08);
      --amber:     #B45309;
      --text:      #191919;
      --text-2:    #666666;
      --text-3:    #999999;
      --font:      'Source Sans 3', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --mono:      'JetBrains Mono', monospace;
      --r:         14px;
      --r-sm:      8px;
      --tab-h:     60px;
      --hdr-h:     54px;
      --si-bottom: env(safe-area-inset-bottom, 0px);
      --si-top:    env(safe-area-inset-top, 0px);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%; overflow: hidden;
      background: var(--bg); color: var(--text);
      font-family: var(--font); font-size: 16px;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ─────────────────────────────────────────────── */
    .hdr {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      height: calc(var(--hdr-h) + var(--si-top));
      padding: var(--si-top) 16px 0;
      display: flex; align-items: center; justify-content: space-between;
      background: var(--blue);
      border-bottom: none;
    }
    .hdr-title { font-size: 17px; font-weight: 700; letter-spacing: -.025em; display: flex; align-items: center; gap: 9px; color: white; }
    .hdr-title em { font-style: normal; color: rgba(255,255,255,.85); font-weight: 700; }
    .hdr-logo {
      width: 26px; height: 26px; border-radius: 4px;
      background: white; color: var(--blue);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; flex-shrink: 0;
    }
    .hdr-sync {
      display: flex; align-items: center; gap: 5px;
      font-size: 11px; font-family: var(--mono); color: rgba(255,255,255,.65);
    }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,.4); transition: background .3s; }
    .dot.ok    { background: #4ade80; }
    .dot.load  { background: #fbbf24; animation: blink 1s infinite; }
    .dot.err   { background: #fca5a5; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.25} }

    /* ── Main scroll area ────────────────────────────────────── */
    .main {
      position: fixed;
      top: calc(var(--hdr-h) + var(--si-top));
      bottom: calc(var(--tab-h) + var(--si-bottom));
      left: 0; right: 0;
      overflow-y: auto; -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
    }
    .pane { display: none; padding: 14px; min-height: 100%; animation: up .18s ease; }
    .pane.on { display: block; }
    @keyframes up { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }

    /* ── Tab bar ─────────────────────────────────────────────── */
    .bar {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
      height: calc(var(--tab-h) + var(--si-bottom));
      padding-bottom: var(--si-bottom);
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
    }
    .tbtn {
      flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 3px; background: none; border: none; cursor: pointer;
      color: var(--text-3); font-family: var(--font); font-size: 10.5px; font-weight: 500;
      transition: color .2s; -webkit-tap-highlight-color: transparent; position: relative;
    }
    .tbtn.on { color: var(--blue); }
    .tbtn svg { width: 21px; height: 21px; }
    .tbtn i   { font-size: 20px; }
    .mic  i   { font-size: 17px; }
    .btn  i   { font-size: 13px; }
    .bdg {
      position: absolute; top: 7px; right: calc(50% - 19px);
      background: var(--blue); color: #fff;
      font-size: 10px; font-weight: 700; line-height: 1;
      min-width: 15px; height: 15px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center; padding: 0 3px;
    }

    /* ── Cards ───────────────────────────────────────────────── */
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--r); padding: 14px; margin-bottom: 11px;
      transition: border-color .2s;
    }
    .card.gone { animation: out .28s ease forwards; overflow: hidden; }
    @keyframes out { to { transform: translateX(60px); opacity: 0; max-height: 0; padding: 0; margin: 0; border-width: 0; } }

    /* ── Badges ──────────────────────────────────────────────── */
    .meta { display: flex; gap: 5px; margin-bottom: 11px; flex-wrap: wrap; align-items: center; }
    .b {
      font-size: 10.5px; font-weight: 600; letter-spacing: .04em; text-transform: uppercase;
      padding: 2.5px 7px; border-radius: 5px; font-family: var(--mono);
    }
    .b-type    { background: var(--blue-dim); color: var(--blue); }
    .b-fmt     { background: rgba(0,0,0,.05); color: var(--text-2); }
    .b-project { background: rgba(245,158,11,.12); color: var(--amber); }
    .b-draft   { background: rgba(0,0,0,.05); color: var(--text-3); }
    .b-ok      { background: var(--green-dim); color: var(--green); }
    .b-pub     { background: var(--blue-dim); color: var(--blue); }
    .cid { font-size: 10px; font-family: var(--mono); color: var(--text-3); margin-left: auto; }

    /* ── Post content ────────────────────────────────────────── */
    .body { font-size: 13.5px; line-height: 1.65; white-space: pre-wrap; word-break: break-word; }
    .body.clip { display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden; }
    .more { background: none; border: none; color: var(--blue); font-family: var(--font);
            font-size: 12.5px; font-weight: 600; cursor: pointer; margin-top: 7px; padding: 0;
            -webkit-tap-highlight-color: transparent; }

    /* ── Action buttons ──────────────────────────────────────── */
    .actions { display: flex; gap: 7px; margin-top: 13px; }
    .btn {
      flex: 1; display: flex; align-items: center; justify-content: center; gap: 5px;
      height: 40px; border-radius: var(--r-sm); border: none;
      font-family: var(--font); font-size: 13.5px; font-weight: 600;
      cursor: pointer; transition: all .15s; -webkit-tap-highlight-color: transparent;
    }
    .btn:active:not(:disabled) { transform: scale(.96); }
    .btn:disabled { opacity: .45; cursor: not-allowed; transform: none; }
    .approve { background: var(--green-dim); color: var(--green); border: 1px solid rgba(5,118,66,.2); }
    .approve:hover:not(:disabled) { background: rgba(5,118,66,.14); }
    .reject  { background: var(--red-dim);   color: var(--red);   border: 1px solid rgba(204,16,22,.2); }
    .reject:hover:not(:disabled)  { background: rgba(204,16,22,.14); }
    .save    { background: var(--blue-dim);  color: var(--blue);  border: 1px solid rgba(10,102,194,.28); }
    .save:hover:not(:disabled)    { background: rgba(10,102,194,.22); }
    .primary { background: var(--blue); color: #fff; border: none; }
    .primary:hover { background: #0a55a8; }

    /* ── FAQ ─────────────────────────────────────────────────── */
    .q-text { font-size: 14.5px; font-weight: 500; line-height: 1.5; margin-bottom: 11px; }
    .q-row  { display: flex; gap: 7px; align-items: flex-start; }
    textarea.qa {
      flex: 1; background: var(--surface-2); border: 1px solid var(--border);
      border-radius: var(--r-sm); color: var(--text); font-family: var(--font);
      font-size: 13.5px; line-height: 1.55; padding: 9px 11px;
      resize: none; min-height: 78px; outline: none; transition: border-color .2s;
    }
    textarea.qa:focus { border-color: var(--blue); }
    .mic {
      width: 40px; height: 40px; border-radius: 50%; flex-shrink: 0;
      background: var(--surface-2); border: 1px solid var(--border);
      color: var(--text-2); display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all .2s; -webkit-tap-highlight-color: transparent; position: relative;
    }
    .mic.rec { background: rgba(220,38,38,.14); border-color: #dc2626; color: #dc2626; }
    .mic.rec::before, .mic.rec::after {
      content: ''; position: absolute; border-radius: 50%;
      border: 2px solid rgba(220,38,38,.35); animation: ring 1.3s ease-out infinite;
    }
    .mic.rec::before { inset: -7px; }
    .mic.rec::after  { inset: -14px; animation-delay: .4s; }
    @keyframes ring { 0%{transform:scale(.7);opacity:1} 100%{transform:scale(1.4);opacity:0} }
    .card.rec-active { border-color: rgba(220,38,38,.35); box-shadow: 0 0 0 1px rgba(220,38,38,.12); }

    /* ── Status ──────────────────────────────────────────────── */
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; margin-bottom: 14px; }
    .scard { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); padding: 14px; text-align: center; }
    .sval { font-size: 38px; font-weight: 800; letter-spacing: -.04em; line-height: 1; margin-bottom: 3px; }
    .slbl { font-size: 10.5px; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; color: var(--text-3); }

    /* ── Section headings ────────────────────────────────────── */
    .sh { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .st { font-size: 11.5px; font-weight: 600; text-transform: uppercase; letter-spacing: .08em; color: var(--text-3); }
    .sc { font-size: 11px; font-family: var(--mono); color: var(--text-3); }

    /* ── Info rows ───────────────────────────────────────────── */
    .irow { display: flex; justify-content: space-between; align-items: center; padding: 9px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
    .irow:last-child { border-bottom: none; }
    .ik { color: var(--text-2); }
    .iv { font-family: var(--mono); font-size: 11.5px; color: var(--text-3); }

    /* ── Divider ─────────────────────────────────────────────── */
    .div { height: 1px; background: var(--border); margin: 14px 0; }

    /* ── Empty ───────────────────────────────────────────────── */
    .empty { text-align: center; padding: 56px 20px; }
    .empty-ico { font-size: 38px; margin-bottom: 10px; }
    .empty-ttl { font-size: 15px; font-weight: 600; color: var(--text-2); margin-bottom: 5px; }
    .empty-txt { font-size: 13px; color: var(--text-3); line-height: 1.5; }

    /* ── Loader ──────────────────────────────────────────────── */
    .ld { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 56px 20px; color: var(--text-3); font-size: 13px; }
    .spin { width: 17px; height: 17px; border: 2px solid var(--border); border-top-color: var(--blue); border-radius: 50%; animation: spin .65s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── PAT modal ───────────────────────────────────────────── */
    .overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.5);
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      display: flex; align-items: flex-end;
      padding: 14px; padding-bottom: calc(14px + var(--si-bottom));
      z-index: 200;
    }
    .overlay.gone { display: none; }
    .modal {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 20px; padding: 22px; width: 100%;
      animation: su .3s cubic-bezier(.32,.72,0,1);
    }
    @keyframes su { from{transform:translateY(80%);opacity:0} to{transform:none;opacity:1} }
    .m-title { font-size: 20px; font-weight: 700; margin-bottom: 7px; }
    .m-desc  { font-size: 13.5px; color: var(--text-2); line-height: 1.55; margin-bottom: 18px; }
    .m-desc code { font-family: var(--mono); font-size: 12px; background: var(--surface-2); padding: 1px 5px; border-radius: 4px; }
    .m-inp {
      width: 100%; background: var(--surface-2); border: 1px solid var(--border);
      border-radius: var(--r-sm); color: var(--text); font-family: var(--mono);
      font-size: 13px; padding: 11px 13px; outline: none; margin-bottom: 10px; transition: border-color .2s;
    }
    .m-inp:focus { border-color: var(--blue); }
    .m-note { font-size: 11.5px; color: var(--text-3); margin-bottom: 15px; line-height: 1.5; }

    /* ── Toast ───────────────────────────────────────────────── */
    .toast {
      position: fixed; top: calc(var(--hdr-h) + var(--si-top) + 10px);
      left: 50%; transform: translateX(-50%) translateY(-14px);
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 100px; padding: 7px 15px;
      font-size: 13px; font-weight: 500; color: var(--text);
      z-index: 300; opacity: 0; transition: all .25s; white-space: nowrap; pointer-events: none;
    }
    .toast.on { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.ok  { border-color: rgba(5,118,66,.35); color: var(--green); }
    .toast.bad { border-color: rgba(204,16,22,.35); color: var(--red); }

    .lnk { background: none; border: none; color: var(--blue); font-family: var(--font); font-size: 13.5px; font-weight: 600; cursor: pointer; padding: 0; -webkit-tap-highlight-color: transparent; }

    /* ── LinkedIn Card ───────────────────────────────────────── */
    .post-wrap { margin-bottom: 16px; }
    .post-wrap.gone { animation: out .28s ease forwards; overflow: hidden; }
    .status-pill { display: inline-flex; align-items: center; font-size: 10px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; padding: 3px 9px; border-radius: 100px; margin-bottom: 7px; font-family: var(--mono); }
    .pill-draft    { background: rgba(0,0,0,.06); color: var(--text-2); }
    .pill-approved { background: var(--green-dim); color: var(--green); border: 1px solid rgba(5,118,66,.2); }
    .li-card { background: #fff; border-radius: 10px; border: 1px solid #e0e0e0; overflow: hidden; }
    .li-hdr  { display: flex; align-items: flex-start; padding: 12px 12px 6px; gap: 9px; }
    .li-avatar { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; flex-shrink: 0; border: 1px solid rgba(0,0,0,.08); }
    .li-meta { flex: 1; min-width: 0; }
    .li-name { font-size: 15px; font-weight: 700; color: #000; line-height: 1.2; margin-bottom: 1px; }
    .li-headline { font-size: 12.5px; color: #666; line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .li-time { font-size: 11.5px; color: #999; margin-top: 2px; }
    .li-dots { background: none; border: none; color: #666; font-size: 20px; padding: 0 4px; cursor: pointer; flex-shrink: 0; -webkit-tap-highlight-color: transparent; line-height: 1; }
    .li-body-wrap { padding: 0 12px 12px; }
    .li-body { font-size: 14px; color: rgba(0,0,0,.9); line-height: 1.5; word-break: break-word; }
    .li-body.clamp { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    .li-hashtag { color: #0A66C2; }
    .li-seemore { background: none; border: none; color: #0A66C2; font-size: 14px; font-weight: 600; cursor: pointer; padding: 3px 0 0; display: block; -webkit-tap-highlight-color: transparent; }
    .fb-badge { padding: 0 12px 10px; font-size: 12px; display: flex; align-items: center; gap: 4px; }
    .post-acts { display: flex; gap: 6px; margin-top: 8px; }
    .pact { flex: 1; height: 36px; border-radius: 8px; border: none; font-family: var(--font); font-size: 12.5px; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 4px; cursor: pointer; transition: all .15s; -webkit-tap-highlight-color: transparent; }
    .pact:active:not(:disabled) { transform: scale(.95); }
    .pact:disabled { opacity: .4; cursor: not-allowed; transform: none; }
    .pact-approve  { background: var(--green-dim); color: var(--green); border: 1px solid rgba(5,118,66,.2); }
    .pact-edit     { background: var(--blue-dim); color: var(--blue); border: 1px solid rgba(10,102,194,.2); }
    .pact-delete   { background: var(--red-dim); color: var(--red); border: 1px solid rgba(204,16,22,.2); }
    .pact-note     { background: rgba(180,83,9,.08); color: var(--amber); border: 1px solid rgba(180,83,9,.2); }
    .pact-cancel   { background: rgba(0,0,0,.05); color: var(--text-2); border: 1px solid rgba(0,0,0,.1); }
    .pact-save     { background: var(--blue); color: #fff; }
    .pact-unapprove{ background: rgba(0,0,0,.05); color: var(--text-2); border: 1px solid rgba(0,0,0,.1); }
    .edit-panel { display: none; margin-top: 8px; }
    .edit-panel.on { display: block; }
    .edit-ta { width: 100%; background: var(--surface-2); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-family: var(--font); font-size: 14px; line-height: 1.5; padding: 11px 13px; resize: none; min-height: 180px; outline: none; transition: border-color .2s; }
    .edit-ta:focus { border-color: var(--blue); }
    .edit-acts { display: flex; gap: 6px; margin-top: 6px; }
    .fb-panel { display: none; margin-top: 8px; }
    .fb-panel.on { display: block; }
    .stars-row { display: flex; gap: 4px; justify-content: center; padding: 10px 0 8px; }
    .star { font-size: 28px; cursor: pointer; color: #d0d0d0; transition: color .1s; -webkit-tap-highlight-color: transparent; user-select: none; line-height: 1; }
    .star.on { color: #f5a623; }
    .fb-ta { width: 100%; background: var(--surface-2); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-family: var(--font); font-size: 13.5px; line-height: 1.5; padding: 10px 12px; resize: none; min-height: 80px; outline: none; transition: border-color .2s; margin-bottom: 8px; }
    .fb-ta:focus { border-color: var(--blue); }

    /* ── Visual picker ───────────────────────────────────────────── */
    .vis-section { margin-top: 9px; padding-top: 9px; border-top: 1px solid var(--border); }
    .vis-label { font-size: 10.5px; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; color: var(--text-3); margin-bottom: 7px; }
    .vis-row { display: flex; gap: 6px; overflow-x: auto; -webkit-overflow-scrolling: touch; padding-bottom: 2px; }
    .vis-opt { flex-shrink: 0; width: 70px; cursor: pointer; border-radius: 8px; border: 1.5px solid var(--border); overflow: hidden; transition: border-color .15s, transform .1s; -webkit-tap-highlight-color: transparent; }
    .vis-opt:active { transform: scale(.94); }
    .vis-sel { border-color: var(--blue); }
    .vis-thumb-wrap { width: 100%; height: 46px; background: var(--surface-2); display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
    .vis-img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
    .vis-add { color: var(--text-3); font-size: 16px; line-height: 1; z-index: 1; }
    .vis-lbl { display: block; font-size: 9px; font-weight: 600; text-align: center; color: var(--text-3); padding: 3px 2px; letter-spacing: .04em; text-transform: uppercase; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .vis-sel .vis-lbl { color: var(--blue); }
    /* ── LinkedIn card image + reactions ─────────────────────── */
    .li-vis-wrap { display: none; }
    .li-vis-wrap img { width: 100%; display: block; }
    .li-reactions { display: flex; border-top: 1px solid #e0e0e0; padding: 2px 4px; }
    .li-react-btn { flex: 1; display: flex; align-items: center; justify-content: center; gap: 5px; height: 40px; background: none; border: none; color: #666; font-size: 13px; font-weight: 600; cursor: default; border-radius: 4px; font-family: var(--font); }
  </style>
</head>
<body>

<!-- Header -->
<header class="hdr">
  <div class="hdr-title"><span class="hdr-logo"><i class="fa-brands fa-linkedin-in"></i></span><em>LinkedIn</em>&nbsp;Pipeline</div>
  <div class="hdr-sync">
    <div class="dot" id="dot"></div>
    <span id="sync-lbl">—</span>
  </div>
</header>

<!-- PAT Modal -->
<div class="overlay gone" id="pat-modal">
  <div class="modal">
    <div class="m-title">Connexion</div>
    <div class="m-desc">
      Entre ton GitHub Personal Access Token avec <strong>Contents: Read &amp; Write</strong> sur <code>hugsos/linkedin-pipeline</code>.<br><br>
      Crée-le sur <strong>github.com/settings/tokens</strong> → Classic → scope <code>repo</code>.
    </div>
    <input class="m-inp" id="pat-in" type="password" placeholder="ghp_..." autocomplete="off" spellcheck="false">
    <div class="m-note">Stocké uniquement dans <code>localStorage</code> de ton navigateur.</div>
    <button class="btn primary" style="width:100%;height:44px" onclick="savePat()">Enregistrer</button>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Content -->
<main class="main">
  <div class="pane on" id="pane-posts">
    <div class="ld" id="ld-posts"><div class="spin"></div> Chargement...</div>
    <div id="posts-out" style="display:none"></div>
  </div>
  <div class="pane" id="pane-faq">
    <div class="ld" id="ld-faq"><div class="spin"></div> Chargement...</div>
    <div id="faq-out" style="display:none"></div>
  </div>
  <div class="pane" id="pane-status">
    <div class="ld" id="ld-status"><div class="spin"></div> Chargement...</div>
    <div id="status-out" style="display:none"></div>
  </div>
</main>

<!-- Tab bar -->
<nav class="bar">
  <button class="tbtn on" id="tb-posts" onclick="tab('posts')">
    <span id="bdg-posts" class="bdg" style="display:none"></span>
    <i class="fa-solid fa-file-lines"></i>
    Posts
  </button>
  <button class="tbtn" id="tb-faq" onclick="tab('faq')">
    <span id="bdg-faq" class="bdg" style="display:none"></span>
    <i class="fa-solid fa-microphone"></i>
    FAQ
  </button>
  <button class="tbtn" id="tb-status" onclick="tab('status')">
    <i class="fa-solid fa-chart-simple"></i>
    Statut
  </button>
</nav>

<script>
// ── Config ──────────────────────────────────────────────────────────────
const REPO    = 'hugsos/linkedin-pipeline';
const API_BASE = `https://api.github.com/repos/${REPO}/contents/`;
const PATHS   = { drafts: 'data/drafts.json', faq: 'data/faq.json', answers: 'data/faq_answers.json' };

let pat = localStorage.getItem('gh_pat') || '';
let $  = {};   // cache: { drafts:{data,sha}, faq:{data,sha}, answers:{data,sha} }
let _ratings = {};
const _imgCache = {};

// ── Bootstrap ────────────────────────────────────────────────────────────
function boot() {
  if (!pat) { document.getElementById('pat-modal').classList.remove('gone'); return; }
  loadAll();
}

function savePat() {
  const v = document.getElementById('pat-in').value.trim();
  if (!v) return;
  pat = v; localStorage.setItem('gh_pat', v);
  document.getElementById('pat-modal').classList.add('gone');
  loadAll();
}
document.getElementById('pat-in').addEventListener('keydown', e => e.key === 'Enter' && savePat());

// ── GitHub API ───────────────────────────────────────────────────────────
async function ghGet(path) {
  const r = await fetch(API_BASE + path, {
    headers: { Authorization: `Bearer ${pat}`, Accept: 'application/vnd.github+json' },
    cache: 'no-store'
  });
  if (r.status === 401) { resetPat(); throw new Error('Token invalide'); }
  if (!r.ok) throw new Error(`GitHub ${r.status}`);
  const j = await r.json();
  const txt = decodeURIComponent(escape(atob(j.content.replace(/\n/g, ''))));
  return { data: JSON.parse(txt), sha: j.sha };
}

async function ghPut(path, data, sha, msg) {
  const content = btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2) + '\n')));
  const r = await fetch(API_BASE + path, {
    method: 'PUT',
    headers: { Authorization: `Bearer ${pat}`, Accept: 'application/vnd.github+json', 'Content-Type': 'application/json' },
    body: JSON.stringify({ message: msg, content, sha })
  });
  if (r.status === 401) { resetPat(); throw new Error('Token invalide'); }
  if (r.status === 409) throw new Error('Conflit — rafraîchis et réessaie');
  if (!r.ok) { const e = await r.json(); throw new Error(e.message || `GitHub ${r.status}`); }
}

function resetPat() {
  pat = ''; localStorage.removeItem('gh_pat');
  document.getElementById('pat-in').value = '';
  document.getElementById('pat-modal').classList.remove('gone');
  toast('Token invalide — entre un nouveau token', 'bad');
}

// ── Load all ─────────────────────────────────────────────────────────────
async function loadAll() {
  sync('load', 'sync...');
  try {
    const [dr, fq, an] = await Promise.all([ghGet(PATHS.drafts), ghGet(PATHS.faq), ghGet(PATHS.answers)]);
    $.drafts = dr; $.faq = fq; $.answers = an;
    renderPosts(); renderFaq(); renderStatus();
    badges(); sync('ok', 'synced');
  } catch(e) {
    sync('err', 'erreur'); toast(e.message, 'bad');
  }
}

// ── Tab switching ────────────────────────────────────────────────────────
function tab(name) {
  document.querySelectorAll('.pane').forEach(el => el.classList.remove('on'));
  document.querySelectorAll('.tbtn').forEach(el => el.classList.remove('on'));
  document.getElementById('pane-' + name).classList.add('on');
  document.getElementById('tb-'   + name).classList.add('on');
}

function badges() {
  const drafts   = ($.drafts?.data  || []);
  const faq      = ($.faq?.data     || []);
  const answers  = ($.answers?.data || []);
  const dCount   = drafts.filter(d => d.status === 'DRAFT').length;
  const answered = new Set(answers.filter(a => a.treated).map(a => a.id));
  const fCount   = faq.filter(q => !answered.has(q.id)).length;
  setBadge('posts', dCount); setBadge('faq', fCount);
}

function setBadge(name, n) {
  const el = document.getElementById('bdg-' + name);
  if (n > 0) { el.textContent = n; el.style.display = 'flex'; }
  else        { el.style.display = 'none'; }
}

function sync(state, txt) {
  document.getElementById('dot').className      = 'dot ' + state;
  document.getElementById('sync-lbl').textContent = txt;
}

// ── Visual picker ────────────────────────────────────────────────────────
async function resolveImg(el, path) {
  if (!path) return;
  const norm = path.replace(/\\/g, '/');
  if (_imgCache[norm]) { el.src = _imgCache[norm]; el.style.display = ''; _hideAdd(el); return; }
  try {
    const r = await fetch(API_BASE + norm, {
      headers: { Authorization: `Bearer ${pat}`, Accept: 'application/vnd.github.raw+v1' }
    });
    if (!r.ok) return;
    const blob = await r.blob();
    _imgCache[norm] = URL.createObjectURL(blob);
    el.src = _imgCache[norm]; el.style.display = ''; _hideAdd(el);
  } catch {}
}

function _hideAdd(img) {
  const add = img.parentElement?.querySelector('.vis-add');
  if (add) add.style.display = 'none';
}

function loadVisuals(p) {
  const pid = p.id;
  const vis = p.visuals || {};
  const cur = p.visual  || '';
  for (const key of ['screenshot', 'og_image', 'stock', 'custom']) {
    const path = vis[key] || '';
    if (!path) continue;
    const wrap = document.getElementById(`vis-thumb-${pid}-${key}`);
    if (!wrap) continue;
    const img = wrap.querySelector('.vis-img');
    if (img) resolveImg(img, path);
  }
  if (cur) {
    const wrap = document.getElementById(`livis-${pid}`);
    if (wrap) { wrap.style.display = 'block'; resolveImg(wrap.querySelector('img'), cur); }
  }
}

function visOptHtml(p, key, label) {
  const path = (p.visuals || {})[key] || '';
  if (!path) return '';
  const pid = esc(p.id);
  const sel = p.visual === path ? ' vis-sel' : '';
  return `<div class="vis-opt${sel}" id="vis-opt-${pid}-${key}" data-id="${pid}" data-path="${esc(path)}" onclick="selectVisual(this.dataset.id, this.dataset.path)">
    <div class="vis-thumb-wrap" id="vis-thumb-${pid}-${key}">
      <img class="vis-img" src="" alt="" style="display:none">
    </div>
    <span class="vis-lbl">${label}</span>
  </div>`;
}

async function selectVisual(id, path) {
  // Immediate DOM feedback — don't wait for API
  document.querySelectorAll(`[id^="vis-opt-${id}-"]`).forEach(el => {
    el.classList.toggle('vis-sel', el.dataset.path === path);
    const lbl = el.querySelector('.vis-lbl');
    if (lbl) lbl.style.color = el.dataset.path === path ? 'var(--blue)' : '';
  });
  const wrap = document.getElementById(`livis-${id}`);
  if (wrap) {
    wrap.style.display = path ? 'block' : 'none';
    if (path) resolveImg(wrap.querySelector('img'), path);
  }

  sync('load', 'maj...');
  try {
    const res = await ghGet(PATHS.drafts);
    const list = res.data;
    const i = list.findIndex(d => d.id === id);
    if (i < 0) throw new Error('Draft introuvable');
    list[i].visual = path;
    await ghPut(PATHS.drafts, list, res.sha, `🖼️ Visuel — ${id}`);
    $.drafts = { data: list, sha: res.sha };
    sync('ok', 'synced'); toast('<i class="fa-solid fa-check"></i> Visuel sélectionné', 'ok');
  } catch(e) { sync('err', 'erreur'); toast(e.message, 'bad'); }
}

function triggerCustom(id) { document.getElementById(`vis-file-${id}`)?.click(); }

async function handleCustom(id, input) {
  const file = input.files?.[0];
  if (!file) return;
  const ext  = (file.name.split('.').pop() || 'jpg').toLowerCase();
  const dest = `data/images/custom-${id}.${ext}`;
  sync('load', 'upload...');
  try {
    const b64 = await new Promise((res, rej) => {
      const r = new FileReader();
      r.onload  = e => res(e.target.result.split(',')[1]);
      r.onerror = rej;
      r.readAsDataURL(file);
    });
    let existingSha = null;
    try {
      const chk = await fetch(API_BASE + dest, { headers: { Authorization: `Bearer ${pat}`, Accept: 'application/vnd.github+json' } });
      if (chk.ok) { const j = await chk.json(); existingSha = j.sha; }
    } catch {}
    const body = { message: `📸 Image custom — ${id}`, content: b64 };
    if (existingSha) body.sha = existingSha;
    const up = await fetch(API_BASE + dest, {
      method: 'PUT',
      headers: { Authorization: `Bearer ${pat}`, Accept: 'application/vnd.github+json', 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    if (!up.ok) { const e = await up.json(); throw new Error(e.message || 'Upload échoué'); }
    const res  = await ghGet(PATHS.drafts);
    const list = res.data;
    const i    = list.findIndex(d => d.id === id);
    if (i < 0) throw new Error('Draft introuvable');
    if (!list[i].visuals) list[i].visuals = { screenshot: '', og_image: '', stock: '', custom: '' };
    list[i].visuals.custom = dest;
    list[i].visual         = dest;
    await ghPut(PATHS.drafts, list, res.sha, `🖼️ Image custom — ${id}`);
    $.drafts = { data: list, sha: res.sha };
    delete _imgCache[dest];
    renderPosts();
    sync('ok', 'synced'); toast('<i class="fa-solid fa-check"></i> Image uploadée', 'ok');
  } catch(e) { sync('err', 'erreur'); toast(e.message, 'bad'); }
  input.value = '';
}

// ── Posts ────────────────────────────────────────────────────────────────
function renderPosts() {
  document.getElementById('ld-posts').style.display  = 'none';
  const out = document.getElementById('posts-out');
  out.style.display = 'block';

  const live = ($.drafts?.data || []).filter(d => d.status === 'DRAFT' || d.status === 'APPROVED');
  if (!live.length) {
    out.innerHTML = `<div class="empty"><div class="empty-ico"><i class="fa-solid fa-circle-check"></i></div><div class="empty-ttl">File vide</div><div class="empty-txt">Les drafts apparaîtront ici après la génération du lundi.</div></div>`;
    return;
  }

  const pending  = live.filter(d => d.status === 'DRAFT');
  const approved = live.filter(d => d.status === 'APPROVED');
  let h = '';
  if (pending.length)  { h += `<div class="sh"><span class="st">À valider</span><span class="sc">${pending.length}</span></div>`;  pending.forEach(p  => { h += postCard(p); }); }
  if (approved.length) { h += `<div class="sh" style="margin-top:${pending.length?'20px':'0'}"><span class="st">Approuvés</span><span class="sc">${approved.length}</span></div>`; approved.forEach(p => { h += postCard(p); }); }
  out.innerHTML = h;
  requestAnimationFrame(() => live.forEach(p => {
    const body = document.getElementById('libody-' + p.id);
    const btn  = document.getElementById('lism-'   + p.id);
    if (body && btn && body.scrollHeight <= body.clientHeight + 1) btn.style.display = 'none';
    loadVisuals(p);
  }));
}

function formatContent(text) {
  return text
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/\n/g, '<br>')
    .replace(/#(\w+)/g, '<span class="li-hashtag">#$1</span>');
}

function postCard(p) {
  const pid = esc(p.id);
  const isApproved = p.status === 'APPROVED';
  const pillCls = isApproved ? 'pill-approved' : 'pill-draft';
  const pillTxt = isApproved ? 'Approuvé' : 'Draft';
  const stars = p.rating ? '★'.repeat(p.rating) : '';
  const fbTxt = p.feedback ? esc(p.feedback.substring(0, 40)) + (p.feedback.length > 40 ? '…' : '') : '';
  const fbBadge = (stars || fbTxt)
    ? `<div class="fb-badge"><span style="color:#f5a623">${stars}</span>${fbTxt ? `<span style="color:var(--text-3)">${fbTxt}</span>` : ''}</div>`
    : '';
  const currentRating = _ratings[p.id] ?? p.rating ?? 0;
  const starsHtml = [1,2,3,4,5].map(n =>
    `<span class="star${currentRating >= n ? ' on' : ''}" onclick="setRating('${pid}',${n})">★</span>`
  ).join('');
  const customPath = (p.visuals || {}).custom || '';
  const customSel  = customPath && p.visual === customPath ? ' vis-sel' : '';

  return `<div class="post-wrap" id="pwrap-${pid}">
  <span class="status-pill ${pillCls}">${pillTxt}</span>
  <div class="li-card">
    <div class="li-hdr">
      <img class="li-avatar" src="avatar.jpg?v=3" alt="Hugo">
      <div class="li-meta">
        <div class="li-name">Hugo Bourgeois</div>
        <div class="li-headline">Développeur Web | Étudiant en BUT Information &amp; Communication | En recherche d'alternance</div>
        <div class="li-time">1j • 🌐</div>
      </div>
      <button class="li-dots"><i class="fa-solid fa-ellipsis"></i></button>
    </div>
    <div class="li-body-wrap">
      <div class="li-body clamp" id="libody-${pid}">${formatContent(p.content||'')}</div>
      <button class="li-seemore" id="lism-${pid}" onclick="liExpand('${pid}')">...voir plus</button>
    </div>
    <div class="li-vis-wrap" id="livis-${pid}" style="${p.visual ? 'display:block' : 'display:none'}">
      <img src="" alt="">
    </div>
    <div class="li-reactions">
      <button class="li-react-btn"><i class="fa-regular fa-thumbs-up"></i> J'aime</button>
      <button class="li-react-btn"><i class="fa-regular fa-comment"></i> Commenter</button>
      <button class="li-react-btn"><i class="fa-solid fa-repeat" style="font-size:11px"></i> Republier</button>
      <button class="li-react-btn"><i class="fa-regular fa-paper-plane"></i> Envoyer</button>
    </div>
    ${fbBadge}
  </div>
  <div class="post-acts" id="pacts-${pid}">
    ${!isApproved
      ? `<button class="pact pact-approve" onclick="setStatus('${pid}','APPROVED')"><i class="fa-solid fa-check"></i></button>`
      : `<button class="pact pact-unapprove" onclick="setStatus('${pid}','DRAFT')"><i class="fa-solid fa-rotate-left"></i></button>`
    }
    <button class="pact pact-edit"   onclick="toggleEdit('${pid}')"><i class="fa-solid fa-pen"></i></button>
    <button class="pact pact-note"   onclick="toggleFeedback('${pid}')"><i class="fa-solid fa-star"></i></button>
    <button class="pact pact-delete" onclick="deletePost('${pid}')"><i class="fa-solid fa-trash"></i></button>
  </div>
  <div class="vis-section">
    <div class="vis-label"><i class="fa-regular fa-image"></i>&nbsp;Visuel</div>
    <div class="vis-row">
      ${visOptHtml(p, 'screenshot', 'Screenshot')}
      ${visOptHtml(p, 'og_image', 'Article')}
      ${visOptHtml(p, 'stock', 'Stock')}
      <div class="vis-opt${customSel}" id="vis-opt-${pid}-custom" onclick="triggerCustom('${pid}')">
        <div class="vis-thumb-wrap" id="vis-thumb-${pid}-custom">
          <img class="vis-img" src="" alt="" style="display:none">
          <div class="vis-add"><i class="fa-solid fa-plus"></i></div>
        </div>
        <span class="vis-lbl">Custom</span>
      </div>
    </div>
  </div>
  <input type="file" accept="image/*" id="vis-file-${pid}" style="display:none" onchange="handleCustom('${pid}', this)">
  <div class="edit-panel" id="edit-${pid}">
    <textarea class="edit-ta" id="edit-ta-${pid}">${esc(p.content||'')}</textarea>
    <div class="edit-acts">
      <button class="pact pact-cancel" style="flex:1" onclick="toggleEdit('${pid}')">Annuler</button>
      <button class="pact pact-save"   style="flex:2" onclick="saveEdit('${pid}')">Sauvegarder</button>
    </div>
  </div>
  <div class="fb-panel" id="fb-${pid}">
    <div class="stars-row" id="stars-${pid}">${starsHtml}</div>
    <textarea class="fb-ta" id="fb-ta-${pid}" placeholder="Note pour Claude — ton ressenti sur ce post...">${esc(p.feedback||'')}</textarea>
    <div class="edit-acts">
      <button class="pact pact-cancel" style="flex:1" onclick="toggleFeedback('${pid}')">Annuler</button>
      <button class="pact pact-save"   style="flex:2" onclick="saveFeedback('${pid}')"><i class="fa-solid fa-paper-plane"></i> Envoyer</button>
    </div>
  </div>
</div>`;
}

function liExpand(id) {
  const body = document.getElementById('libody-' + id);
  const btn  = document.getElementById('lism-'   + id);
  body.classList.toggle('clamp');
  btn.textContent = body.classList.contains('clamp') ? '...voir plus' : 'voir moins';
}

async function setStatus(id, status) {
  const wrap = document.getElementById('pwrap-' + id);
  if (wrap) wrap.querySelectorAll('.pact').forEach(b => b.disabled = true);
  sync('load', 'maj...');
  try {
    const res = await ghGet(PATHS.drafts);
    const list = res.data;
    const i = list.findIndex(d => d.id === id);
    if (i < 0) throw new Error('Draft introuvable');
    list[i].status = status;
    if (status === 'APPROVED') list[i].approved_at = new Date().toISOString();
    if (status === 'REJECTED') list[i].rejected_at = new Date().toISOString();
    const msg = { APPROVED:'✅ Approuvé', REJECTED:'❌ Rejeté', DRAFT:'↩️ Remis en draft' }[status] + ` — ${id}`;
    await ghPut(PATHS.drafts, list, res.sha, msg);
    $.drafts = { data: list, sha: res.sha };
    wrap?.classList.add('gone');
    setTimeout(() => { renderPosts(); badges(); }, 300);
    sync('ok', 'synced');
    toast({ APPROVED:'<i class="fa-solid fa-circle-check"></i> Approuvé', REJECTED:'<i class="fa-solid fa-trash"></i> Rejeté', DRAFT:'<i class="fa-solid fa-rotate-left"></i> Remis en draft' }[status], status === 'APPROVED' ? 'ok' : '');
  } catch(e) {
    sync('err', 'erreur'); toast(e.message, 'bad');
    if (wrap) wrap.querySelectorAll('.pact').forEach(b => b.disabled = false);
  }
}

// ── Post edit ────────────────────────────────────────────────────────────
function toggleEdit(id) {
  const panel = document.getElementById('edit-' + id);
  const isOpen = !panel.classList.contains('on');
  panel.classList.toggle('on');
  document.getElementById('fb-' + id)?.classList.remove('on');
  if (isOpen) {
    const draft = ($.drafts?.data || []).find(d => d.id === id);
    const ta = document.getElementById('edit-ta-' + id);
    if (draft && ta) ta.value = draft.content || '';
    ta?.focus();
  }
}

async function saveEdit(id) {
  const ta = document.getElementById('edit-ta-' + id);
  const newContent = ta?.value?.trim();
  if (!newContent) { toast('Le contenu ne peut pas être vide', 'bad'); return; }
  const panel = document.getElementById('edit-' + id);
  panel.querySelectorAll('button').forEach(b => b.disabled = true);
  sync('load', 'sauvegarde...');
  try {
    const res = await ghGet(PATHS.drafts);
    const list = res.data;
    const i = list.findIndex(d => d.id === id);
    if (i < 0) throw new Error('Draft introuvable');
    list[i].content   = newContent;
    list[i].edited_at = new Date().toISOString();
    await ghPut(PATHS.drafts, list, res.sha, `✏️ Draft modifié — ${id}`);
    $.drafts = { data: list, sha: res.sha };
    renderPosts(); badges();
    sync('ok', 'synced'); toast('<i class="fa-solid fa-check"></i> Modifié', 'ok');
  } catch(e) {
    sync('err', 'erreur'); toast(e.message, 'bad');
    panel.querySelectorAll('button').forEach(b => b.disabled = false);
  }
}

async function deletePost(id) {
  if (!confirm('Supprimer ce post définitivement ?')) return;
  sync('load', 'suppression...');
  try {
    const res  = await ghGet(PATHS.drafts);
    const list = res.data.filter(d => d.id !== id);
    await ghPut(PATHS.drafts, list, res.sha, `🗑️ Draft supprimé — ${id}`);
    $.drafts = { data: list, sha: res.sha };
    const wrap = document.getElementById('pwrap-' + id);
    wrap?.classList.add('gone');
    setTimeout(() => { renderPosts(); badges(); renderStatus(); }, 300);
    sync('ok', 'synced'); toast('<i class="fa-solid fa-trash"></i> Supprimé');
  } catch(e) {
    sync('err', 'erreur'); toast(e.message, 'bad');
  }
}

// ── Post feedback ─────────────────────────────────────────────────────────
function toggleFeedback(id) {
  const panel = document.getElementById('fb-' + id);
  panel.classList.toggle('on');
  document.getElementById('edit-' + id)?.classList.remove('on');
}

function setRating(id, n) {
  _ratings[id] = n;
  const row = document.getElementById('stars-' + id);
  if (!row) return;
  row.querySelectorAll('.star').forEach((el, i) => el.classList.toggle('on', i < n));
}

async function saveFeedback(id) {
  const ta     = document.getElementById('fb-ta-' + id);
  const note   = ta?.value?.trim() || '';
  const rating = _ratings[id] ?? ($.drafts?.data || []).find(d => d.id === id)?.rating ?? 0;
  if (!rating && !note) { toast('Ajoute une note ou une étoile', 'bad'); return; }
  const panel = document.getElementById('fb-' + id);
  panel.querySelectorAll('button').forEach(b => b.disabled = true);
  sync('load', 'envoi...');
  try {
    const res  = await ghGet(PATHS.drafts);
    const list = res.data;
    const i    = list.findIndex(d => d.id === id);
    if (i < 0) throw new Error('Draft introuvable');
    if (rating) list[i].rating      = rating;
    if (note)   list[i].feedback    = note;
    list[i].feedback_at = new Date().toISOString();
    await ghPut(PATHS.drafts, list, res.sha, `⭐ Feedback — ${id}`);
    $.drafts = { data: list, sha: res.sha };
    delete _ratings[id];
    panel.classList.remove('on');
    renderPosts(); badges();
    sync('ok', 'synced'); toast('<i class="fa-solid fa-star"></i> Feedback envoyé', 'ok');
  } catch(e) {
    sync('err', 'erreur'); toast(e.message, 'bad');
    panel.querySelectorAll('button').forEach(b => b.disabled = false);
  }
}

// ── FAQ ──────────────────────────────────────────────────────────────────
function renderFaq() {
  document.getElementById('ld-faq').style.display = 'none';
  const out = document.getElementById('faq-out');
  out.style.display = 'block';

  const allQ    = $.faq?.data     || [];
  const allA    = $.answers?.data || [];
  const ansById = Object.fromEntries(allA.map(a => [a.id, a]));
  const pending = allQ.filter(q => !ansById[q.id]);
  const done    = allQ.filter(q =>  ansById[q.id]);

  let h = '';

  // ── En attente ──
  if (pending.length) {
    const byProject = {};
    pending.forEach(q => (byProject[q.project] = byProject[q.project] || []).push(q));
    h += `<div class="sh"><span class="st">À répondre</span><span class="sc">${pending.length}</span></div>`;
    for (const [proj, qs] of Object.entries(byProject)) {
      h += `<div class="div"></div><span class="b b-project" style="display:inline-block;margin-bottom:11px">${esc(proj)}</span>`;
      qs.forEach(q => { h += faqCard(q, null); });
    }
  }

  // ── Déjà répondues ──
  if (done.length) {
    h += `<div class="div" style="margin-top:${pending.length?'20px':'0'}"></div>`;
    h += `<div class="sh"><span class="st">Répondues</span><span class="sc">${done.length}</span></div>`;
    const byProject = {};
    done.forEach(q => (byProject[q.project] = byProject[q.project] || []).push(q));
    for (const [proj, qs] of Object.entries(byProject)) {
      h += `<div class="div"></div><span class="b b-project" style="display:inline-block;margin-bottom:11px">${esc(proj)}</span>`;
      qs.forEach(q => { h += faqCard(q, ansById[q.id]); });
    }
  }

  if (!pending.length && !done.length) {
    h = `<div class="empty"><div class="empty-ico"><i class="fa-solid fa-microphone"></i></div><div class="empty-ttl">Aucune question</div><div class="empty-txt">Les nouvelles questions FAQ apparaîtront ici après la prochaine génération.</div></div>`;
  }

  out.innerHTML = h;
}

function faqCard(q, ans) {
  const isAnswered = !!ans;
  return `<div class="card" id="qcard-${esc(q.id)}" data-id="${esc(q.id)}" data-project="${esc(q.project)}" data-question="${esc(q.question)}">
    <div class="q-text">${esc(q.question)}</div>
    <div class="q-row">
      <textarea class="qa" id="qa-${esc(q.id)}" placeholder="Réponds ici ou utilise le micro…">${isAnswered ? esc(ans.answer) : ''}</textarea>
      <button class="mic" id="mic-${esc(q.id)}" onclick="toggleMic('${esc(q.id)}')">
        <i class="fa-solid fa-microphone"></i>
      </button>
    </div>
    <div class="actions" style="margin-top:9px">
      <button class="btn save" id="save-${esc(q.id)}" onclick="saveAnswer('${esc(q.id)}')">
        <i class="fa-solid fa-${isAnswered ? 'pen' : 'check'}"></i>
        ${isAnswered ? 'Modifier' : 'Sauvegarder'}
      </button>
    </div>
  </div>`;
}

// ── Voice ────────────────────────────────────────────────────────────────
let recog = null, recId = null;

function toggleMic(id) {
  if (recId === id) { stopMic(); return; }
  if (recId)        stopMic();
  startMic(id);
}

function startMic(id) {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { toast('Web Speech API indisponible — utilise Chrome Android', 'bad'); return; }
  const r = new SR();
  r.lang = 'fr-FR'; r.continuous = true; r.interimResults = true;
  const ta = document.getElementById('qa-' + id);
  const base = ta?.value || '';
  let finalText = base;

  r.onstart = () => {
    document.getElementById('mic-' + id)?.classList.add('rec');
    document.getElementById('qcard-' + id)?.classList.add('rec-active');
    recId = id;
  };
  r.onresult = e => {
    let interim = '';
    finalText = base;
    for (let i = 0; i < e.results.length; i++) {
      if (e.results[i].isFinal) finalText += (finalText ? ' ' : '') + e.results[i][0].transcript.trim();
      else interim += e.results[i][0].transcript;
    }
    if (ta) ta.value = finalText + (interim ? ' ' + interim : '');
  };
  r.onerror = e => { toast('Micro : ' + e.error, 'bad'); stopMic(); };
  r.onend   = () => { if (recId === id) stopMic(); };
  r.start(); recog = r;
}

function stopMic() {
  try { recog?.stop(); } catch(e) {}
  recog = null;
  if (recId) {
    document.getElementById('mic-'   + recId)?.classList.remove('rec');
    document.getElementById('qcard-' + recId)?.classList.remove('rec-active');
    recId = null;
  }
}

async function saveAnswer(id) {
  const ta  = document.getElementById('qa-'   + id);
  const btn = document.getElementById('save-' + id);
  const card = document.getElementById('qcard-' + id);
  const answer = ta?.value?.trim();
  if (!answer) { toast('Écris ou dicte une réponse', 'bad'); return; }
  stopMic();
  if (btn) btn.disabled = true;
  sync('load', 'sauvegarde...');

  const project  = card?.dataset?.project  || '';
  const question = card?.dataset?.question || '';

  try {
    const res  = await ghGet(PATHS.answers);
    const list = res.data || [];
    const idx  = list.findIndex(a => a.id === id);
    const entry = { id, project, question, answer, treated: false, answered_at: new Date().toISOString() };
    if (idx >= 0) {
      entry.treated = list[idx].treated; // preserve treated state when editing
      list[idx] = entry;
    } else {
      list.push(entry);
    }
    await ghPut(PATHS.answers, list, res.sha, `🎙 FAQ ${idx >= 0 ? 'modifiée' : 'répondue'} — ${project}`);
    $.answers = { data: list, sha: res.sha };
    renderFaq(); badges(); renderStatus();
    sync('ok', 'synced'); toast(idx >= 0 ? '<i class="fa-solid fa-pen"></i> Réponse modifiée' : '<i class="fa-solid fa-circle-check"></i> Réponse sauvegardée', 'ok');
  } catch(e) {
    sync('err', 'erreur'); toast(e.message, 'bad');
    if (btn) btn.disabled = false;
  }
}

// ── Status ───────────────────────────────────────────────────────────────
function renderStatus() {
  document.getElementById('ld-status').style.display = 'none';
  const out = document.getElementById('status-out');
  out.style.display = 'block';

  const dr  = $.drafts?.data  || [];
  const fq  = $.faq?.data     || [];
  const an  = $.answers?.data || [];

  const nDraft   = dr.filter(d => d.status === 'DRAFT').length;
  const nApprove = dr.filter(d => d.status === 'APPROVED').length;
  const nPub     = dr.filter(d => d.status === 'PUBLISHED').length;
  const done     = new Set(an.filter(a => a.treated).map(a => a.id));
  const nFaq     = fq.filter(q => !done.has(q.id)).length;

  const lastGen  = dr.filter(d => d.created_at ).sort((a,b) => b.created_at .localeCompare(a.created_at ))[0];
  const lastPub  = dr.filter(d => d.published_at).sort((a,b) => b.published_at.localeCompare(a.published_at))[0];

  out.innerHTML = `
  <div class="grid2">
    <div class="scard"><div class="sval" style="color:var(--blue)">${nDraft}</div><div class="slbl">À valider</div></div>
    <div class="scard"><div class="sval" style="color:var(--green)">${nApprove}</div><div class="slbl">Approuvés</div></div>
    <div class="scard"><div class="sval" style="color:var(--amber)">${nFaq}</div><div class="slbl">FAQ</div></div>
    <div class="scard"><div class="sval" style="color:var(--text-2)">${nPub}</div><div class="slbl">Publiés</div></div>
  </div>
  <div class="div"></div>
  <div class="sh"><span class="st">Pipeline</span></div>
  <div class="card">
    <div class="irow"><span class="ik">Dernière génération</span><span class="iv">${lastGen ? fmt(lastGen.created_at) : '—'}</span></div>
    <div class="irow"><span class="ik">Dernier post publié</span><span class="iv">${lastPub ? fmt(lastPub.published_at) : '—'}</span></div>
    <div class="irow"><span class="ik">Prochaine génération</span><span class="iv">Lun. 09:00</span></div>
    <div class="irow"><span class="ik">Prochaine publication</span><span class="iv">Jeu. 09:00</span></div>
  </div>
  <div class="div"></div>
  <div class="sh"><span class="st">Compte</span></div>
  <div class="card">
    <div class="irow"><span class="ik">Token GitHub</span><button class="lnk" onclick="changePat()">Modifier</button></div>
    <div class="irow" style="border:none"><span class="ik">Rafraîchir</span><button class="lnk" onclick="loadAll()">Sync ↺</button></div>
  </div>`;
}

function changePat() {
  document.getElementById('pat-in').value = '';
  document.getElementById('pat-modal').classList.remove('gone');
}

function fmt(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleDateString('fr-FR', { day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit' });
}

// ── Utils ────────────────────────────────────────────────────────────────
function esc(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

let _toastTimer;
function toast(msg, type = '') {
  const el = document.getElementById('toast');
  el.innerHTML = msg; el.className = 'toast on ' + type;
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove('on'), 3000);
}

// ── PWA + Start ──────────────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}

boot();
</script>
